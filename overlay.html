<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>The Quarter — Stream Overlay</title>
<!-- OBS: add as Browser Source, 1920x1080, URL:
     http://localhost:8130/overlay.html  (or https://thequarterarcade.com/overlay.html)
     Background is transparent; the bar sits at the bottom edge. -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; }
  html, body { background: transparent; overflow: hidden; }
  #bar {
    position: fixed; left: 0; right: 0; bottom: 0;
    display: none; align-items: center; gap: 22px;
    padding: 12px 28px;
    background: rgba(7, 7, 15, 0.78);
    border-top: 2px solid #1c1c33;
    font-family: 'VT323', monospace; color: #d8d8e8;
  }
  .ch { font-family: 'Press Start 2P', monospace; font-size: 20px; color: #ffb300;
        text-shadow: 0 0 14px rgba(255,179,0,0.5); white-space: nowrap; }
  .of { font-size: 20px; color: #6a6a8a; white-space: nowrap; }
  .segs { display: flex; gap: 3px; width: 300px; flex-shrink: 0; }
  .seg { flex: 1; height: 14px; background: #12122a; }
  .seg.on { background: #3dff7a; box-shadow: 0 0 6px rgba(61,255,122,0.5); }
  .seg.edge { background: #ffb300; box-shadow: 0 0 10px rgba(255,179,0,0.8); }
  .pct { font-size: 22px; color: #3dff7a; white-space: nowrap; }
  .label { font-family: 'Press Start 2P', monospace; font-size: 10px; color: #ffb300;
           white-space: nowrap; }
  .line { font-size: 24px; color: #a8a8c4; white-space: nowrap; overflow: hidden;
          text-overflow: ellipsis; flex: 1; transition: opacity .4s; }
  .line.proclamation { color: #ffb9a8; }
</style>
</head>
<body>
<div id="bar">
  <span class="ch" id="ch">CH --</span>
  <span class="of">of 25</span>
  <div class="segs" id="segs"></div>
  <span class="pct" id="pct">--%</span>
  <span class="label">THE LEDGER</span>
  <span class="line" id="line"></span>
</div>
<script>
  const segsEl = document.getElementById('segs');
  for (let i = 0; i < 24; i++) {
    const d = document.createElement('div');
    d.className = 'seg';
    segsEl.appendChild(d);
  }
  let lastText = '';
  async function refresh() {
    try {
      const r = await fetch('data/world.json', {cache: 'no-store'});
      if (!r.ok) throw new Error(r.status);
      const w = await r.json();
      const s = w.state;
      document.getElementById('bar').style.display = 'flex';
      document.getElementById('ch').textContent = 'CH ' + String(s.chapter).padStart(2, '0');
      document.getElementById('pct').textContent = s.meter.toFixed(1) + '%';
      const filled = Math.round((Math.min(s.meter, 100) / 100) * 24);
      segsEl.childNodes.forEach((d, i) => {
        d.className = 'seg' + (i < filled ? (i === filled - 1 ? ' on edge' : ' on') : '');
      });
      const e = (w.recent || [])[0];
      const lineEl = document.getElementById('line');
      if (e && e.text !== lastText) {
        lastText = e.text;
        lineEl.style.opacity = 0;
        setTimeout(() => {
          lineEl.textContent = e.text;
          lineEl.className = 'line ' + (e.prominence === 'proclamation' ? 'proclamation' : '');
          lineEl.style.opacity = 1;
        }, 400);
      }
    } catch (err) {
      document.getElementById('bar').style.display = 'none';
    }
  }
  refresh();
  setInterval(refresh, 2000);
</script>
</body>
</html>
